      - type: SDK
        url: https://pypi.org/project/waxell-observe/
      - type: OpenAPI
        url: openapi/waxell-observe-openapi.yml
      - type: JSONSchema
        url: json-schema/waxell-run-schema.json
      - type: JSONSchema
